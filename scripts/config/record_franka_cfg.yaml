record:
  repo_id: &repo_id "franka_task3_step1/TODO_task_description"
  debug: 1
  user_notes: "Franka template; replace TODO values before real collection."
  fps: 30
  control_mode: &control_mode "oculus"
  use_gripper: &use_gripper true
  run_mode: "run_record"  # run_record | run_policy | run_mix

  robot_type: &robot_type "franka_dual_arm"

  teleop:
    control_mode: *control_mode
    dual_arm: true
    oculus_config:
      ip:
      use_gripper: *use_gripper
      # TODO(franka): verify these scalers/signs on the real Franka setup.
      left_pose_scaler: [1.0, 1.0]
      left_channel_signs: [-1, -1, 1, 1, 1, 1]
      right_pose_scaler: [1.0, 1.0]
      right_channel_signs: [-1, -1, 1, 1, 1, 1]
      action_smoothing_alpha: 0.35
      visualize_placo: false

  robot:
    robot_ip: &ip "127.0.0.1"
    robot_port: 4242
    rpc_timeout_sec: 30.0
    schema_mode: "nero_compatible"
    use_gripper: *use_gripper
    close_threshold: 0.5
    gripper_reverse: false
    gripper_max_open: 0.085
    gripper_force: 10.0
    gripper_speed: 0.1
    open_grippers_on_connect: false
    reset_opens_grippers: true
    reset_go_home: true
    go_home_duration_sec: 5.0
    go_home_rate_hz: 50.0
    # TODO(franka): tune wrapper-side clipping only after validating server-side safety.
    max_cartesian_delta:
    max_rotation_delta:

  policy:
    type: "act"
    device: "cuda"
    push_to_hub: false
    temporal_ensemble_coeff: 0.03
    chunk_size: 30
    n_action_steps: 1
    # TODO(franka): set to a Franka checkpoint. Do not point this at a Nero
    # checkpoint unless schema compatibility and real action semantics are verified.
    pretrained_path:

  task:
    description: "TODO describe Franka task"
    num_episodes: 1
    display: true
    resume: false
    resume_dataset:
    success_policy:
    annotate_success: false

  time:
    episode_time_sec: 600
    reset_time_sec: 120
    save_meta_period: 1

  cameras:
    # TODO(franka): replace with the real Franka rig RealSense serial numbers.
    left_wrist_cam_serial: "TODO_LEFT_WRIST_SERIAL"
    right_wrist_cam_serial: "TODO_RIGHT_WRIST_SERIAL"
    head_cam_serial: "TODO_HEAD_SERIAL"
    width: 424
    height: 240

  storage:
    push_to_hub: false

replay:
  dataset_name: "franka_task3_step1/TODO_dataset"
  episode_idx: 0
  reset_on_finish: true
  disconnect_on_finish: false
  robot_type: *robot_type
  robot:
    ip: *ip
    robot_port: 4242
  control_mode: *control_mode

visualize:
  dataset_name: "franka_task3_step1/TODO_dataset"
  episode_index: 0
