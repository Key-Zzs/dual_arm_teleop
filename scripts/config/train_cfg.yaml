train:
  dataset:
    repo_id: "nero_task3_step1/2mL_empty_merged_20260424_E75" # HuggingFace 数据集 repo_id，格式为 "username/dataset_name"
  # 指向包含数据集 repo 的本地目录（要包含 repo_id 子目录），
  # 例如本地缓存路径下的 physbrain3/pick_and_place_merged
    root: "/home/geist/.cache/huggingface/lerobot/nero_task3_step1/2mL_empty_merged_20260424_E75"

  env:

  policy:
    # 纯BC: "act"
    # DAgger: "act_dagger"（会走 core/run_train.py 中的 DAgger 分支）
    type: "act_dagger"
    device: "cuda"
    repo_id: "shenzhaolong/act_policy"
    push_to_hub: false  # 禁用模型推送
    # temporal_ensemble_coeff: null # 关闭时序加权，减少动作启动迟滞
    chunk_size: 30
    n_action_steps: 5
    pretrained_path: "/home/geist/wbcd_workspace/lerobot/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train/task3_step1/2mL_empty/[test_worked]act_20260424_E75/checkpoints/last/pretrained_model"  # 从ACT模型开始DAgger训练

  output_dir: "/home/geist/wbcd_workspace/lerobot/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train/task3_step1/2mL_empty/act_dagger_20260425_E75" # 模型和日志的输出目录
  job_name: "2mL_empty_act_dagger_20260425_E75"

  resume: false
  seed: 1000
  # Number of workers for the dataloader.
  num_workers: 4
  batch_size: 32
  steps: 10_000
  eval_freq: 20_00
  log_freq: 200
  save_checkpoint: True
  # Checkpoint is saved every `save_freq` training iterations and after the last training step.
  save_freq: 5_000
  use_policy_training_preset: True

  eval: 
    n_episodes: 10
    batch_size: 8

  wandb: 
    enable: True
    project: "lerobot_nero"
    # entity: "your-wandb-username"  # 改为您的 WandB 用户名，或注释掉使用默认
    # notes: "训练备注"
    # run_id: "自定义运行ID"
    mode: "online"  # Allowed values: 'online', 'offline' 'disabled'. Defaults to 'online"

  # =========================
  # 离线 DAgger 训练配置（仅当 policy.type=act_dagger 生效）
  # 只需要:
  # 1) dataset: 指向已采集好的数据（优先读取 <root>/dagger_data）
  # 2) training: 每轮离线训练参数
  # =========================
  dagger:
    dataset:
      # 若 aggregated_root 下存在 dagger_data/，会优先从 dagger_data 读取
      aggregated_repo_id: "nero_task3_step1/2mL_empty_dagger_E75"
      aggregated_root: "/home/geist/.cache/huggingface/lerobot/nero_task3_step1/2mL_empty_dagger_E75"
      # 若 aggregated_root 不存在，回退到 seed 数据集
      seed_repo_id: "nero_task3_step1/2mL_empty_merged_20260424_E75"
      seed_root: "/home/geist/.cache/huggingface/lerobot/nero_task3_step1/2mL_empty_merged_20260424_E75"
      resume_aggregation: true
      copy_seed_if_missing: false

    training:
      rounds: 1
      steps_per_round: 8000
      batch_size: 16
      num_workers: 4
      log_freq: 100
      save_checkpoint: true
