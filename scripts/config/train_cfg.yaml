train:
  training:
    device: cuda              # cuda / cpu / auto；优先级高于 policy.device
    gpu:
      enabled: true
      visible_devices: "0"    # 等价于 CUDA_VISIBLE_DEVICES；可设 "0"、"1"、"0,1"；空字符串表示不覆盖现有环境变量
      max_num_gpus: 1         # 当 visible_devices 或环境变量暴露多张卡时，只保留前 N 张
      memory_fraction: 0.70   # PyTorch 单进程 CUDA 显存分配上限；null 表示不限制，不限制 GPU compute 利用率
      allow_tf32: true
      cudnn_benchmark: false
      empty_cache_on_start: true
      log_gpu_info: true
      fail_if_cuda_unavailable: false

  dataset:
    repo_id: "nero_task3_step1/2mL_empty_right_merged_20260520_E249" # HuggingFace 数据集 repo_id，格式为 "username/dataset_name"
  # 指向包含数据集 repo 的本地目录（要包含 repo_id 子目录），
  # 例如本地缓存路径下的 physbrain3/pick_and_place_merged
    root: "/home/deepcybo/.cache/huggingface/lerobot/nero_task3_step1/2mL_empty_right_merged_20260520_E249"

  env:

  policy:
    # 推荐保持为普通 ACT；轮次式 DAgger 会由 run_dagger_rounds.py 在内存中注入训练参数。
    type: "act"
    config_path: scripts/policy_config/act_config.yaml

    # Policy hyperparameters have been moved to scripts/policy_config/*.yaml.
    # train_cfg.yaml should only keep dataset/output/checkpoint/runtime/training-loop settings.
    #
    # Legacy ACT fields below are deprecated. If uncommented for an old run, run_train.py
    # will warn and let these values override the policy yaml for backward compatibility.
    # device: "cuda"
    # repo_id: "shenzhaolong/act_policy"
    # push_to_hub: false  # 禁用模型推送
    # temporal_ensemble_coeff: 0.01 # 关闭时序加权，减少动作启动迟滞
    # chunk_size: 30
    # n_action_steps: 1
    # pretrained_path: "/home/deepcybo/wbcd_ws/Le-nero/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train\
    #                   /task3_step1/8mL_empty_left/[worked]act_20260508_E125/checkpoints/010000/pretrained_model"  # 从 ACT checkpoint 继续训练
    #
    # TODO: The shared act_config.yaml currently keeps record-time values for
    # pretrained_path and temporal_ensemble_coeff. For scratch training or a
    # different training-time temporal ensemble setting, point config_path to a
    # train-specific ACT yaml.

  output_dir: "/home/deepcybo/wbcd_ws/Le-nero/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train\
              /task3_step1/2mL_empty_right/act_20260520_E249_V01" # 模型和日志的输出目录
  job_name: "2mL_empty_right_act_20260520_E249_V01"

  resume: false
  seed: 1000
  # Number of workers for the dataloader.
  num_workers: 4
  batch_size: 32
  steps: 30_000
  eval_freq: 3_000
  log_freq: 500
  save_checkpoint: True
  # Checkpoint is saved every `save_freq` training iterations and after the last training step.
  save_freq: 3_000
  use_policy_training_preset: True

  eval: 
    n_episodes: 10
    batch_size: 8

  wandb: 
    enable: True
    project: "lerobot_nero"
    # entity: "your-wandb-username"  # 改为您的 WandB 用户名，或注释掉使用默认
    # notes: "训练备注"
    # run_id: "自定义运行ID"
    mode: "online"  # Allowed values: 'online', 'offline' 'disabled'. Defaults to 'online"
