train:
  training:
    device: cuda
    gpu:
      enabled: true
      visible_devices: "0"
      max_num_gpus: 1
      memory_fraction: 0.70
      allow_tf32: true
      cudnn_benchmark: false
      empty_cache_on_start: true
      log_gpu_info: true
      fail_if_cuda_unavailable: false

  dataset:
    repo_id: "dual_franka_2/pick_up_and_seal_20260515_v01"
    root: "/home/deepcybo/.cache/huggingface/lerobot/dual_franka_2/pick_up_and_seal_20260515_v01"

  env:

  policy:
    type: "act"  # act | diffusion
    device: "cuda"
    repo_id: "shenzhaolong/act_policy"
    push_to_hub: false
    temporal_ensemble_coeff: 0.03
    chunk_size: 30
    n_action_steps: 1
    # TODO(franka): only warm-start from Nero after schema compatibility and
    # real robot action semantics have been verified.
    pretrained_path:

  output_dir: "outputs/train/act_dual_franka1_pick_up_and_seal_cleaned_1"
  job_name: "act_policy_dual_franka1_pick_up_and_seal_cleaned_1"

  resume: false
  seed: 1000
  # Number of workers for the dataloader.
  num_workers: 4
  batch_size: 32
  steps: 100000
  eval_freq: 50_00
  log_freq: 200
  save_checkpoint: true
  save_freq: 10_00
  use_policy_training_preset: true

  eval:
    n_episodes: 10
    batch_size: 8

  wandb:
    enable: true
    project: "lerobot_franka"
    mode: "online"
