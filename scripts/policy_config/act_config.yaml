# LeRobot ACT policy configuration.
# Used by run_record.py when policy.type == "act".
# Defaults are aligned with LeRobot ACTConfig unless explicitly changed.
#
# Notes:
# - Runtime/inference parameters can be changed for deployment.
# - Model-architecture parameters must match the checkpoint used for inference.
# - Training parameters are exposed for config completeness, but may not affect record-time inference.
# - input_features/output_features are usually inferred by dataset/runtime and should stay empty unless needed.

# -------------------------
# Runtime / framework
# -------------------------
n_obs_steps: 1

input_features: {}
output_features: {}

device: cuda
use_amp: false

push_to_hub: false
repo_id: null
private: null
tags: null
license: null
# pretrained_path: "/home/deepcybo/wbcd_ws/Le-nero/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/dagger_rounds/task3_step1/8mL_empty_left_v02/round_002/train/checkpoints/last/pretrained_model"
# pretrained_path: "/home/deepcybo/wbcd_ws/Le-nero/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train/task3_step1/8mL_empty_left\
#                   /act_20260509_E125_SW_V01/checkpoints/last/pretrained_model"  # 预训练模型路径下要包括config.json
pretrained_path: "/home/deepcybo/wbcd_ws/Le-nero/dual_arm_data_collection/lerobot_dual_arm_teleop/outputs/train/task3_step1\
                  /2mL_empty_right/act_20260520_E249_V01/checkpoints/015000/pretrained_model"

# -------------------------
# Action chunking / inference
# -------------------------
chunk_size: 30
n_action_steps: 1
temporal_ensemble_coeff: 0.03

# -------------------------
# Normalization
# -------------------------
normalization_mapping:
  VISUAL: MEAN_STD
  STATE: MEAN_STD
  ACTION: MEAN_STD

# -------------------------
# Vision encoder
# -------------------------
vision_backbone: resnet18
pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
replace_final_stride_with_dilation: false

# -------------------------
# Transformer
# -------------------------
pre_norm: false
dim_model: 512
n_heads: 8
dim_feedforward: 3200
feedforward_activation: relu
n_encoder_layers: 4
n_decoder_layers: 1

# -------------------------
# VAE latent action modeling
# -------------------------
use_vae: true
latent_dim: 32
n_vae_encoder_layers: 4
kl_weight: 10

# -------------------------
# Regularization / optimization
# Mostly relevant for training, not record-time inference.
# -------------------------
dropout: 0.1
optimizer_lr: 0.00001
optimizer_weight_decay: 0.0001
optimizer_lr_backbone: 0.00001
